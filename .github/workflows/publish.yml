# ============================================================================
# @usethink/node-backend-core — npm 包自动发布 Workflow
# ============================================================================
#
# 触发方式（两种）：
#   1. 推送 git tag（推荐日常使用）
#        git tag v1.0.1 && git push origin v1.0.1
#
#   2. GitHub UI 手动触发（应急兜底）
#        仓库 → Actions → Publish → Run workflow
#
# 前置条件：
#   NPM_TOKEN 通过 scripts/setup-github-secrets.sh 一键配置
# ============================================================================

name: Publish

on:
  # ---- 方式一：推送 tag 时自动发布 ----
  push:
    tags:
      - 'v*'

  # ---- 方式二：在 GitHub UI 中手动触发 ----
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run 模式（只预览，不实际发布）'
        type: boolean
        default: false
      tag:
        description: 'dist-tag（正式版用 latest，beta 用 beta）'
        type: string
        default: latest
      # 混淆开关：仅闭源/商业场景推荐开启，开源场景建议保持 false
      obfuscate:
        description: '混淆源码后发布（保护商业逻辑）'
        type: boolean
        default: false
      obfuscation_level:
        description: '混淆强度（light/standard/aggressive）'
        type: string
        default: standard

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Verify tools
        run: |
          node --version
          npm --version

      # 直接使用 npm 安装依赖，避免 pnpm 在 CI 中的各种兼容问题
      - name: Install dependencies
        run: |
          unset NPM_CONFIG_USERCONFIG
          pnpm install --no-frozen-lockfile
          pnpm approve-builds

      - name: Run tests
        run: npm test

      - name: Obfuscate code
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.obfuscate }}
        run: |
          echo "🔒 混淆模式: ${{ inputs.obfuscation_level }}"
          npm run build:obfuscate -- --level=${{ inputs.obfuscation_level }}

      - name: Prepare obfuscated publish package
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.obfuscate }}
        run: npm run prepare:obfuscated:publish

      - name: Publish to npm
        id: publish
        continue-on-error: true
        run: |
          PUBLISH_TAG="latest"
          PUBLISH_DIR="."
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PUBLISH_TAG="${{ inputs.tag }}"
            if [ "${{ inputs.obfuscate }}" = "true" ]; then
              PUBLISH_DIR=".publish-temp"
            fi
          fi

          # 使用 publish-toolkit 统一发布流程
          PUBLISH_ARGS="--registry=https://registry.npmjs.org/ --verbose"
          if [ "$PUBLISH_DIR" != "." ]; then
            PUBLISH_ARGS="$PUBLISH_ARGS --package=$PUBLISH_DIR"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "🧪 Dry-run 模式..."
              pnpm exec publish-toolkit publish $PUBLISH_ARGS --dry-run --tag="$PUBLISH_TAG"
              echo "dry_run=true" >> $GITHUB_OUTPUT
            else
              echo "🚀 手动触发正式发布 (tag: $PUBLISH_TAG)..."
              pnpm exec publish-toolkit publish $PUBLISH_ARGS --tag="$PUBLISH_TAG"
              echo "dry_run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "🚀 Tag 触发自动发布: ${{ github.ref_name }}"
            pnpm exec publish-toolkit publish $PUBLISH_ARGS --tag=latest
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Display publish result
        if: always()
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          
          if [ "${{ steps.publish.outcome }}" = "success" ]; then
            if [ "${{ steps.publish.output.dry_run }}" = "true" ]; then
              echo "🧪 Dry-run 成功！"
              echo "   包: ${PACKAGE_NAME}@${PACKAGE_VERSION}"
              echo "   查看: https://www.npmjs.com/package/${PACKAGE_NAME}"
            else
              echo "✅ ${PACKAGE_NAME}@${PACKAGE_VERSION} 发布成功！"
              echo "   查看: https://www.npmjs.com/package/${PACKAGE_NAME}"
            fi
          else
            echo "❌ 发布失败，请检查上方日志"
            exit 1
          fi

      # 无论发布成功与否，都清理临时发布目录，保持工作区可重复
      - name: Cleanup obfuscated publish temp dir
        if: always()
        run: |
          if [ -d .publish-temp ]; then
            rm -rf .publish-temp
            echo "♻️ .publish-temp 已清理"
          fi
